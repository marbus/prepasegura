<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>PrepaSegura · Control</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #050810;
  --surface:  #0c1220;
  --surface2: #111d30;
  --border:   #1a2f4a;
  --border2:  #243a55;
  --cyan:     #00e5ff;
  --cyan2:    #0090a8;
  --amber:    #ffab00;
  --green:    #00e676;
  --red:      #ff1744;
  --muted:    #4a6080;
  --text:     #cdd8e8;
  --text2:    #8aa0bc;
  --mono:     'JetBrains Mono', monospace;
  --display:  'Rajdhani', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow-x:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;}

/* ── GRID BG ── */
body::before {
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events:none;z-index:0;
}

/* ── AUTH ── */
#auth-screen {
  position:fixed;inset:0;z-index:100;
  display:flex;align-items:center;justify-content:center;
  background:var(--bg);
}
.auth-wrap {
  width:100%;max-width:380px;padding:20px;
  animation: fadeUp 0.5s ease both;
}
@keyframes fadeUp {
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}
.auth-brand {
  text-align:center;margin-bottom:40px;
}
.auth-logo {
  font-family:var(--display);
  font-size:42px;font-weight:700;
  letter-spacing:6px;
  background:linear-gradient(135deg,var(--cyan),var(--cyan2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  display:block;
}
.auth-sub {
  font-size:11px;color:var(--muted);letter-spacing:3px;
  text-transform:uppercase;margin-top:6px;
}
.auth-box {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:4px;padding:32px;
  position:relative;overflow:hidden;
}
.auth-box::before {
  content:'';position:absolute;
  top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);
}

/* PIN GRID */
.pin-grid {
  display:grid;grid-template-columns:repeat(4,1fr);gap:10px;
  margin-bottom:20px;
}
.pin-key {
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:4px;
  padding:18px 8px;
  text-align:center;
  font-family:var(--display);
  font-size:20px;font-weight:600;
  color:var(--text);
  cursor:pointer;
  transition:all 0.1s;
  user-select:none;
  -webkit-tap-highlight-color:transparent;
}
.pin-key:hover{border-color:var(--cyan);color:var(--cyan);}
.pin-key:active{background:rgba(0,229,255,0.1);transform:scale(0.95);}
.pin-key.del{color:var(--amber);font-size:14px;}
.pin-key.del:hover{border-color:var(--amber);color:var(--amber);}
.pin-key.enter{
  background:var(--cyan);color:var(--bg);
  border-color:var(--cyan);
  font-size:13px;font-weight:700;letter-spacing:1px;
}
.pin-key.enter:hover{background:#00b8cc;}
.pin-key.enter:active{transform:scale(0.97);}

/* PIN DISPLAY */
.pin-display {
  display:flex;gap:10px;justify-content:center;
  margin-bottom:24px;
}
.pin-dot {
  width:12px;height:12px;
  border-radius:50%;
  border:2px solid var(--border2);
  transition:all 0.2s;
}
.pin-dot.filled {
  background:var(--cyan);
  border-color:var(--cyan);
  box-shadow:0 0 8px var(--cyan);
}
.pin-dot.error {
  background:var(--red);
  border-color:var(--red);
  animation:shake 0.3s ease;
}
@keyframes shake {
  0%,100%{transform:translateX(0);}
  25%{transform:translateX(-4px);}
  75%{transform:translateX(4px);}
}
.pin-label {
  text-align:center;font-size:10px;color:var(--muted);
  letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;
}

/* ── MAIN ── */
#main-screen{display:none;min-height:100vh;position:relative;z-index:1;}

.topbar {
  background:rgba(12,18,32,0.95);
  border-bottom:1px solid var(--border);
  padding:12px 20px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;
  backdrop-filter:blur(10px);
}
.topbar-brand {
  display:flex;align-items:center;gap:12px;
}
.status-dot {
  width:8px;height:8px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 8px var(--green);
  animation:pulse2 2s infinite;
}
@keyframes pulse2 {
  0%,100%{opacity:1;}50%{opacity:0.4;}
}
.brand-text {
  font-family:var(--display);font-size:16px;font-weight:700;
  letter-spacing:2px;color:var(--cyan);
}
.brand-ver {
  font-size:9px;color:var(--muted);letter-spacing:1px;
  margin-top:1px;
}
.topbar-time {
  font-size:11px;color:var(--muted);letter-spacing:1px;
}

/* TABS */
.tabs {
  display:flex;
  border-bottom:1px solid var(--border);
  background:var(--surface);
}
.tab {
  flex:1;padding:14px 8px;
  text-align:center;font-size:10px;font-weight:600;
  font-family:var(--display);letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);cursor:pointer;
  border-bottom:2px solid transparent;
  transition:all 0.2s;
}
.tab:hover{color:var(--text2);}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan);}

/* SECTIONS */
.section{display:none;padding:20px;max-width:720px;margin:0 auto;}
.section.active{display:block;}

/* CARDS */
.card {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:4px;padding:20px;
  margin-bottom:16px;
  position:relative;overflow:hidden;
}
.card::before {
  content:'';position:absolute;
  top:0;left:0;width:3px;height:100%;
  background:linear-gradient(180deg,var(--cyan),transparent);
}
.card-title {
  font-family:var(--display);font-size:12px;font-weight:700;
  color:var(--cyan);text-transform:uppercase;letter-spacing:3px;
  margin-bottom:16px;padding-left:8px;
}

/* STATS */
.stats-grid {display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.stat-box {
  background:var(--surface2);border:1px solid var(--border);
  border-radius:4px;padding:16px;text-align:center;
}
.stat-num {
  font-family:var(--display);font-size:36px;font-weight:700;
  color:var(--cyan);line-height:1;
}
.stat-label {
  font-size:9px;color:var(--muted);letter-spacing:2px;
  text-transform:uppercase;margin-top:6px;
}

/* ECOEMS COUNTDOWN */
.countdown-box {
  background:var(--surface2);border:1px solid var(--amber);
  border-radius:4px;padding:24px;text-align:center;margin-bottom:16px;
}
.countdown-num {
  font-family:var(--display);font-size:72px;font-weight:700;
  color:var(--amber);line-height:1;
  text-shadow:0 0 30px rgba(255,171,0,0.4);
}
.countdown-label {
  font-size:10px;color:var(--muted);letter-spacing:3px;
  text-transform:uppercase;margin-top:8px;
}

/* FORM */
.field{margin-bottom:14px;}
.field-label {
  font-size:9px;color:var(--muted);letter-spacing:2px;
  text-transform:uppercase;margin-bottom:8px;display:block;
}
.field input,.field select {
  width:100%;background:var(--surface2);
  border:1px solid var(--border);border-radius:4px;
  padding:12px 14px;color:var(--text);
  font-family:var(--mono);font-size:13px;
  outline:none;transition:border-color 0.2s;
  -webkit-appearance:none;
}
.field input:focus,.field select:focus{border-color:var(--cyan);}
.field select option{background:var(--surface2);}
.field-note{font-size:9px;color:var(--muted);margin-top:4px;letter-spacing:1px;}

/* CODE INPUT */
.code-input-wrap {display:flex;gap:8px;align-items:stretch;}
.code-input-wrap input {
  font-family:var(--display);font-size:22px;font-weight:700;
  letter-spacing:4px;text-transform:uppercase;flex:1;
  color:var(--cyan);
}
.regen-btn {
  background:var(--surface2);border:1px solid var(--border);
  border-radius:4px;padding:0 14px;
  color:var(--green);cursor:pointer;font-size:16px;
  transition:all 0.2s;white-space:nowrap;
}
.regen-btn:hover{border-color:var(--green);}

/* BTN */
.btn {
  width:100%;padding:14px;border:none;border-radius:4px;
  font-family:var(--display);font-size:14px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;transition:all 0.2s;margin-top:12px;
}
.btn-primary {
  background:var(--cyan);color:var(--bg);
}
.btn-primary:hover{background:#00b8cc;box-shadow:0 0 20px rgba(0,229,255,0.3);}
.btn-primary:active{transform:scale(0.98);}
.btn-sm{width:auto;padding:7px 14px;font-size:11px;margin-top:0;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-ghost:hover{border-color:var(--cyan);color:var(--cyan);}
.btn-danger{background:transparent;border:1px solid var(--red);color:var(--red);padding:7px 14px;font-size:10px;}
.btn-danger:hover{background:rgba(255,23,68,0.1);}
.btn-success{background:transparent;border:1px solid var(--green);color:var(--green);padding:7px 14px;font-size:10px;}
.btn-success:hover{background:rgba(0,230,118,0.1);}

/* BADGE */
.badge{
  display:inline-block;padding:3px 8px;border-radius:2px;
  font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  font-family:var(--display);
}
.badge-activo  {background:rgba(0,230,118,0.1);color:var(--green);border:1px solid rgba(0,230,118,0.3);}
.badge-agotado {background:rgba(255,23,68,0.1);color:var(--red);border:1px solid rgba(255,23,68,0.3);}
.badge-inactivo{background:rgba(74,96,128,0.2);color:var(--muted);border:1px solid var(--border);}
.badge-expirado{background:rgba(255,171,0,0.1);color:var(--amber);border:1px solid rgba(255,171,0,0.3);}

/* CODIGO ROW */
.codigo-row {
  background:var(--surface2);border:1px solid var(--border);
  border-radius:4px;padding:14px;margin-bottom:10px;
  transition:border-color 0.2s;
}
.codigo-row:hover{border-color:var(--border2);}
.codigo-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.codigo-val{
  font-family:var(--display);font-size:18px;font-weight:700;
  color:var(--cyan);letter-spacing:3px;
}
.codigo-meta{font-size:10px;color:var(--muted);margin-bottom:3px;letter-spacing:0.5px;}
.codigo-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}

/* RESULTADO GENERADO */
.result-box {
  display:none;
  background:rgba(0,230,118,0.05);
  border:1px solid rgba(0,230,118,0.2);
  border-radius:4px;padding:20px;
  text-align:center;margin-top:16px;
  animation:fadeUp 0.3s ease;
}
.result-code {
  font-family:var(--display);font-size:32px;font-weight:700;
  color:var(--green);letter-spacing:6px;
  text-shadow:0 0 20px rgba(0,230,118,0.4);
  margin:8px 0;
}
.result-meta{font-size:11px;color:var(--muted);margin:4px 0;}
.result-actions{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap;}

/* TOAST */
.toast {
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(80px);
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:4px;padding:12px 20px;
  font-size:12px;color:var(--text);
  z-index:999;transition:transform 0.3s;
  white-space:nowrap;letter-spacing:0.5px;
}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.ok{border-color:var(--green);color:var(--green);}
.toast.err{border-color:var(--red);color:var(--red);}

/* ── LAYOUT ADAPTATIVO ── */
.main-layout {
  display: grid;
  grid-template-columns: 1fr;
  min-height: calc(100vh - 110px);
}

/* Desktop: sidebar de tabs + contenido lado a lado */
@media(min-width: 768px) {
  .tabs {
    flex-direction: column;
    width: 180px;
    min-height: calc(100vh - 56px);
    border-right: 1px solid var(--border);
    border-bottom: none;
    position: fixed;
    top: 56px;
    left: 0;
    background: var(--surface);
    z-index: 40;
  }
  .tab {
    text-align: left;
    padding: 18px 20px;
    border-bottom: none;
    border-left: 2px solid transparent;
    border-right: none;
    font-size: 11px;
  }
  .tab.active {
    border-left-color: var(--cyan);
    border-bottom-color: transparent;
    background: rgba(0,229,255,0.05);
  }
  .main-content {
    margin-left: 180px;
  }
  .section {
    max-width: 100%;
    padding: 24px 32px;
  }
  .stats-grid {
    grid-template-columns: repeat(4,1fr);
  }
  .dashboard-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .dashboard-grid .countdown-box {
    margin-bottom: 0;
  }
  .crear-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .crear-grid .field:first-child {
    grid-column: 1/-1;
  }
}

/* Large desktop */
@media(min-width: 1200px) {
  .tabs { width: 220px; }
  .main-content { margin-left: 220px; }
  .section { max-width: 1000px; padding: 28px 40px; }
  .stats-grid { gap: 16px; }
}

/* Mobile */
@media(max-width: 767px) {
  .topbar { padding: 10px 16px; }
  .brand-text { font-size: 14px; }
  .section { padding: 16px; }
  .stats-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat-num { font-size: 28px; }
  .countdown-num { font-size: 56px; }
  .pin-grid { gap: 8px; }
  .pin-key { padding: 16px 6px; font-size: 18px; }
  .result-actions { flex-direction: column; }
  .result-actions button { width: 100%; }
}

/* Tablet */
@media(min-width: 480px) and (max-width: 767px) {
  .stats-grid { grid-template-columns: repeat(4,1fr); }
}
.spinner{
  width:28px;height:28px;margin:0 auto 12px;
  border:2px solid var(--border);border-top-color:var(--cyan);
  border-radius:50%;animation:spin 0.7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* REFRESH BAR */
.list-header{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:16px;
}
.list-title{font-family:var(--display);font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
</style>
</head>
<body>

<!-- ═══════════════════ AUTH ═══════════════════ -->
<div id="auth-screen">
  <div class="auth-wrap">
    <div class="auth-brand">
      <span class="auth-logo">PREPASEGURA</span>
      <span class="auth-sub">Control Panel · Acceso restringido</span>
    </div>
    <div class="auth-box">
      <div class="pin-label">INGRESA TU PIN</div>
      <div class="pin-display" id="pin-display">
        <div class="pin-dot" id="d0"></div>
        <div class="pin-dot" id="d1"></div>
        <div class="pin-dot" id="d2"></div>
        <div class="pin-dot" id="d3"></div>
        <div class="pin-dot" id="d4"></div>
        <div class="pin-dot" id="d5"></div>
      </div>
      <div class="pin-grid">
        <div class="pin-key" onclick="addPin('1')">1</div>
        <div class="pin-key" onclick="addPin('2')">2</div>
        <div class="pin-key" onclick="addPin('3')">3</div>
        <div class="pin-key" onclick="addPin('4')">4</div>
        <div class="pin-key" onclick="addPin('5')">5</div>
        <div class="pin-key" onclick="addPin('6')">6</div>
        <div class="pin-key" onclick="addPin('7')">7</div>
        <div class="pin-key" onclick="addPin('8')">8</div>
        <div class="pin-key" onclick="addPin('9')">9</div>
        <div class="pin-key del" onclick="delPin()">⌫</div>
        <div class="pin-key" onclick="addPin('0')">0</div>
        <div class="pin-key enter" onclick="doLogin()">OK</div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════ MAIN ═══════════════════ -->
<div id="main-screen">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="status-dot"></div>
      <div>
        <div class="brand-text">PREPASEGURA</div>
        <div class="brand-ver">ADMIN · v3.0 · ECOEMS 2026</div>
      </div>
    </div>
    <div class="topbar-time" id="topbar-time">--:--:--</div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('dashboard',this)">◈ Stats</div>
    <div class="tab" onclick="switchTab('crear',this)">+ Crear</div>
    <div class="tab" onclick="switchTab('codigos',this)">⌗ Códigos</div>
  </div>

  <div class="main-content">
  <!-- DASHBOARD -->
  <div id="tab-dashboard" class="section active">
    <div id="stats-container"><div class="loading"><div class="spinner"></div>CARGANDO...</div></div>
    <div style="margin-top:8px;">
      <button class="btn btn-ghost" style="border-color:var(--cyan);color:var(--cyan);font-size:11px;padding:10px;" onclick="crearPrueba()">
        🧪 CREAR CÓDIGO DE PRUEBA RÁPIDA
      </button>
    </div>
  </div>

  <!-- CREAR -->
  <div id="tab-crear" class="section">
    <div class="card">
      <div class="card-title">Nuevo Código de Acceso</div>
      <div class="crear-grid">
      <div class="field">
        <label class="field-label">Nombre del Alumno</label>
        <input type="text" id="new-alumno" placeholder="Nombre completo" oninput="sugerirCodigo(this.value)">
      </div>

      <div class="field">
        <label class="field-label">Código <span style="color:var(--green);font-size:9px;">● AUTO</span></label>
        <div class="code-input-wrap">
          <input type="text" id="new-codigo" placeholder="———" maxlength="8"
                 oninput="this.value=this.value.replace(/[^A-Z0-9]/g,'').toUpperCase()">
          <button class="regen-btn" onclick="regenerarCodigo()" title="Generar nuevo">🔄</button>
        </div>
        <div class="field-note">Máx 8 · Solo letras y números · Sin símbolos</div>
      </div>

      <div class="field">
        <label class="field-label">Tutor / Papá / Mamá</label>
        <input type="text" id="new-tutor" placeholder="Nombre del responsable">
      </div>

      <div class="field">
        <label class="field-label">WhatsApp del Tutor</label>
        <input type="tel" id="new-tel" placeholder="5512345678">
      </div>

      <div class="field">
        <label class="field-label">Tipo de Acceso</label>
        <select id="new-tipo">
          <option value="simulacro">Simulacro Completo — 128 preguntas ECOEMS</option>
          <option value="matematicas">Módulo Matemáticas</option>
          <option value="espanol">Módulo Español</option>
          <option value="ciencias">Módulo Ciencias</option>
          <option value="paquete5">Paquete 5 Días</option>
          <option value="beta">Beta Tester</option>
        </select>
      </div>

      <div class="field">
        <label class="field-label">Vigencia desde activación</label>
        <select id="new-horas">
          <option value="12">12 horas</option>
          <option value="24">24 horas</option>
          <option value="48" selected>48 horas</option>
          <option value="72">3 días</option>
          <option value="120">5 días</option>
          <option value="168">1 semana</option>
        </select>
      </div>

      <div class="field">
        <label class="field-label">Usos permitidos</label>
        <select id="new-usos">
          <option value="1">1 uso — recomendado</option>
          <option value="3">3 usos</option>
          <option value="5">5 usos — paquete</option>
        </select>
      </div>
      </div><!-- /crear-grid -->

      <button class="btn btn-primary" onclick="crearCodigo()">⚡ GENERAR CÓDIGO</button>

      <div class="result-box" id="result-box">
        <div style="font-size:9px;color:var(--muted);letter-spacing:2px;">CÓDIGO GENERADO ✓</div>
        <div class="result-code" id="res-codigo">—</div>
        <div class="result-meta" id="res-alumno">—</div>
        <div class="result-meta" id="res-expiry">—</div>
        <div class="result-actions">
          <button class="btn btn-success btn-sm" onclick="copiarMensaje()">📋 Copiar WA</button>
          <button class="btn btn-primary btn-sm" onclick="compartirWhatsApp()">📲 Abrir WA</button>
        </div>
      </div>
    </div>
  </div>

  <!-- CÓDIGOS -->
  <div id="tab-codigos" class="section">
    <div class="list-header">
      <div class="list-title">⌗ Todos los Códigos</div>
      <button class="btn btn-ghost btn-sm" onclick="cargarCodigos()">↻ Refresh</button>
    </div>
    <div id="codigos-lista"><div class="loading"><div class="spinner"></div>CARGANDO...</div></div>
  </div>
  </div><!-- /main-content -->
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════ CONFIG ══════════════
const API_URL = "https://script.google.com/macros/s/AKfycbwGA2KAVGGH9Zgb1n6SR9_UrrcBJtWuN_tWPN5ZBfCWTdJn_7vkMGwsXB8ZAygUxBeHsA/exec";
const SECRET  = "PS2026zova";
const PIN     = "260326"; // PIN numérico — cambia esto

let lastCreated = null;
let codigosCache = null;
let pinBuffer = "";

// ══════════════ PIN LOGIN ══════════════
function addPin(n) {
  if (pinBuffer.length >= 6) return;
  pinBuffer += n;
  renderDots();
  if (pinBuffer.length === 6) setTimeout(doLogin, 200);
}

function delPin() {
  pinBuffer = pinBuffer.slice(0,-1);
  renderDots();
}

function renderDots() {
  for (let i=0;i<6;i++) {
    const d = document.getElementById('d'+i);
    d.className = 'pin-dot' + (i < pinBuffer.length ? ' filled' : '');
  }
}

function doLogin() {
  if (pinBuffer === PIN) {
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    cargarTodo();
    updateTime();
    setInterval(updateTime, 1000);
  } else {
    // Error visual
    for (let i=0;i<6;i++) {
      const d = document.getElementById('d'+i);
      d.className = 'pin-dot error';
    }
    setTimeout(() => { pinBuffer = ''; renderDots(); }, 700);
    toast("PIN incorrecto", "err");
  }
}

// Teclado físico también funciona
document.addEventListener('keydown', e => {
  if (!document.getElementById('auth-screen').style.display ||
      document.getElementById('auth-screen').style.display !== 'none') {
    if (e.key >= '0' && e.key <= '9') addPin(e.key);
    if (e.key === 'Backspace') delPin();
    if (e.key === 'Enter') doLogin();
  }
});

// ══════════════ API ══════════════
function apiCall(params, timeoutMs=15000) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now() + '_' + Math.random().toString(36).slice(2);
    const qs = new URLSearchParams({...params, secret:SECRET, callback:cb}).toString();
    const s  = document.createElement('script');
    const t  = setTimeout(() => {
      delete window[cb];
      if (s.parentNode) s.parentNode.removeChild(s);
      reject(new Error('Sin respuesta — verifica internet'));
    }, timeoutMs);
    window[cb] = (data) => {
      clearTimeout(t);
      delete window[cb];
      if (s.parentNode) s.parentNode.removeChild(s);
      resolve(data);
    };
    s.onerror = () => { clearTimeout(t); delete window[cb]; reject(new Error('Error de red')); };
    s.src = `${API_URL}?${qs}`;
    document.body.appendChild(s);
  });
}

// ══════════════ CARGA PRINCIPAL ══════════════
async function cargarTodo() {
  try {
    const data = await apiCall({action:'listar'});
    if (!data.ok) throw new Error(data.error);
    codigosCache = data.codigos || [];
    renderDashboard(codigosCache);
    renderCodigos(codigosCache);
  } catch(e) {
    document.getElementById('stats-container').innerHTML =
      `<div style="color:var(--red);font-size:11px;padding:20px;letter-spacing:1px;">ERROR: ${e.message}</div>`;
  }
}

function updateTime() {
  document.getElementById('topbar-time').textContent =
    new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

function switchTab(name, el) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if (name==='codigos') codigosCache ? renderCodigos(codigosCache) : cargarCodigos();
  if (name==='dashboard') codigosCache ? renderDashboard(codigosCache) : cargarTodo();
}

// ══════════════ DASHBOARD ══════════════
function renderDashboard(codigos) {
  const ahora = new Date();
  const activos   = codigos.filter(c=>c.estado==='activo'&&new Date(c.expira)>ahora).length;
  const usados    = codigos.filter(c=>c.estado==='agotado').length;
  const expirados = codigos.filter(c=>new Date(c.expira)<=ahora&&c.estado==='activo').length;
  const dias = Math.ceil((new Date('2026-06-20')-ahora)/(1000*60*60*24));

  document.getElementById('stats-container').innerHTML = `
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-num" style="color:var(--green)">${activos}</div><div class="stat-label">Activos</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--red)">${usados}</div><div class="stat-label">Usados</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--amber)">${expirados}</div><div class="stat-label">Expirados</div></div>
      <div class="stat-box"><div class="stat-num">${codigos.length}</div><div class="stat-label">Total</div></div>
    </div>
    <div class="dashboard-grid">
    <div class="countdown-box">
      <div class="countdown-label">Días al ECOEMS 2026</div>
      <div class="countdown-num">${dias}</div>
      <div class="countdown-label" style="margin-top:8px;">20 · 21 · 27 · 28 JUN 2026</div>
    </div>
    <div class="card" style="margin-bottom:0;">
      <div class="card-title">Actividad Reciente</div>
      ${codigos.slice(-5).reverse().map(c=>{
        const b=getBadge(c,ahora);
        return `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);">
          <div>
            <div style="font-family:var(--display);font-size:14px;color:var(--cyan);letter-spacing:2px;">${c.codigo}</div>
            <div style="font-size:10px;color:var(--muted);margin-top:2px;">${c.alumno}</div>
          </div>
          <span class="badge badge-${b.cls}">${b.txt}</span>
        </div>`;
      }).join('')}
    </div>
    </div>`;
}

// ══════════════ CÓDIGOS ══════════════
function renderCodigos(codigos) {
  const lista = document.getElementById('codigos-lista');
  const ahora = new Date();
  if (!codigos.length) { lista.innerHTML='<div class="loading">Sin códigos aún</div>'; return; }
  lista.innerHTML = [...codigos].reverse().map(c=>{
    const b=getBadge(c,ahora);
    const activo=c.estado==='activo'&&new Date(c.expira)>ahora;
    return `<div class="codigo-row">
      <div class="codigo-top">
        <div class="codigo-val">${c.codigo}</div>
        <span class="badge badge-${b.cls}">${b.txt}</span>
      </div>
      <div class="codigo-meta">👤 ${c.alumno} · ${c.tipo}</div>
      <div class="codigo-meta">🧑 ${c.tutor||'—'} ${c.tel_tutor?'· '+c.tel_tutor:''}</div>
      <div class="codigo-meta">⏰ ${new Date(c.expira).toLocaleString('es-MX')}</div>
      <div class="codigo-meta">🔢 Usos: ${c.usos}/${c.usos_max}</div>
      <div class="codigo-actions">
        ${activo
          ?`<button class="btn btn-danger" onclick="toggleCodigo('${c.codigo}','inactivo')">⛔ Desactivar</button>`
          :`<button class="btn btn-success" onclick="toggleCodigo('${c.codigo}','activo')">✅ Activar</button>`}
        ${c.tel_tutor?`<a href="https://wa.me/52${c.tel_tutor}" target="_blank"><button class="btn btn-success">📲 WA</button></a>`:''}
        <button class="btn btn-ghost" onclick="extenderCodigo('${c.codigo}',1)" style="font-size:9px;padding:7px 10px;border-color:var(--cyan);color:var(--cyan);">+1h</button>
        <button class="btn btn-ghost" onclick="extenderCodigo('${c.codigo}',24)" style="font-size:9px;padding:7px 10px;border-color:var(--cyan);color:var(--cyan);">+24h</button>
        <button class="btn btn-ghost" onclick="extenderCodigo('${c.codigo}',48)" style="font-size:9px;padding:7px 10px;border-color:var(--cyan);color:var(--cyan);">+48h</button>
        <button class="btn btn-danger" onclick="borrarCodigo('${c.codigo}')" style="opacity:0.6;font-size:9px;">🗑 Borrar</button>      </div>
    </div>`;
  }).join('');
}

async function cargarCodigos() {
  document.getElementById('codigos-lista').innerHTML='<div class="loading"><div class="spinner"></div>CARGANDO...</div>';
  try {
    const data = await apiCall({action:'listar'});
    if (!data.ok) throw new Error(data.error);
    codigosCache = data.codigos||[];
    renderCodigos(codigosCache);
    renderDashboard(codigosCache);
  } catch(e) {
    document.getElementById('codigos-lista').innerHTML=
      `<div style="color:var(--red);font-size:11px;padding:20px">ERROR: ${e.message}</div>`;
  }
}

async function toggleCodigo(codigo,estado) {
  try {
    const data = await apiCall({action:'toggle',codigo,estado});
    if (data.ok){toast(codigo+' → '+estado, estado==='activo'?'ok':'err'); codigosCache=null; cargarCodigos();}
  } catch(e){toast('Error: '+e.message,'err');}
}

// ══════════════ CREAR CÓDIGO ══════════════
async function extenderCodigo(codigo, horas) {
  try {
    const data = await apiCall({action:'extender', codigo, horas});
    if (data.ok) {
      const nueva = new Date(data.nueva_expira);
      toast(`${codigo} → +${horas}h · vence ${nueva.toLocaleString('es-MX',{weekday:'short',hour:'2-digit',minute:'2-digit'})}`, 'ok');
      codigosCache = null;
      cargarTodo();
    } else {
      toast('Error: ' + data.error, 'err');
    }
  } catch(e) { toast('Error: ' + e.message, 'err'); }
}


async function borrarCodigo(codigo) {
  // Paso 1: confirmar
  if (!confirm(`¿Seguro que quieres borrar "${codigo}"?\n\nEsta acción no se puede deshacer.`)) return;
  // Paso 2: segundo seguro
  if (!confirm(`⚠️ ÚLTIMA CONFIRMACIÓN\n\nBorrar: ${codigo}\n\n¿Continuar?`)) return;
  try {
    const data = await apiCall({action:'borrar', codigo});
    if (data.ok) {
      toast('🗑 ' + codigo + ' borrado', 'ok');
      codigosCache = null;
      cargarTodo();
    } else {
      toast('Error: ' + data.error, 'err');
    }
  } catch(e) { toast('Error: ' + e.message, 'err'); }
}

async function crearPrueba() {
  const num = Math.floor(1000 + Math.random() * 9000);
  const codigo = 'TEST' + num;
  toast('Creando prueba ' + codigo + '...');
  try {
    const data = await apiCall({
      action:'crear', codigo,
      alumno:'Usuario Prueba',
      tutor:'Ismael Toledo',
      tel_tutor:'5519261540',
      tipo:'beta',
      horas:'2',
      usos_max:'1'
    });
    if (!data.ok) throw new Error(data.error);
    // Mostrar código con opción de copiar
    const expira = new Date(data.expira);
    toast('✓ ' + codigo + ' · válido 2h', 'ok');
    // Alert con el código para copiarlo fácil
    setTimeout(() => {
      if (confirm(`Código de prueba creado:\n\n${codigo}\n\nVálido hasta: ${expira.toLocaleString('es-MX')}\n\n¿Copiar al portapapeles?`)) {
        navigator.clipboard.writeText(codigo);
      }
    }, 500);
    codigosCache = null;
    cargarTodo();
  } catch(e) { toast('Error: '+e.message,'err'); }
}


function sugerirCodigo(nombre) {
  if (!nombre||nombre.trim().length<2) return;
  const prefix = nombre.trim().toUpperCase().replace(/[^A-Z]/g,'').substring(0,3);
  const num = Math.floor(1000+Math.random()*9000);
  const input = document.getElementById('new-codigo');
  if (!input.value || input.value.length===7||input.value.length===8) {
    input.value = prefix+num;
  }
}

function regenerarCodigo() {
  const nombre = document.getElementById('new-alumno').value.trim();
  const prefix = nombre ? nombre.toUpperCase().replace(/[^A-Z]/g,'').substring(0,3) : 'PS';
  const num = Math.floor(1000+Math.random()*9000);
  document.getElementById('new-codigo').value = prefix+num;
}

async function crearCodigo() {
  const codigo = document.getElementById('new-codigo').value.trim().toUpperCase();
  const alumno = document.getElementById('new-alumno').value.trim();
  const tutor  = document.getElementById('new-tutor').value.trim();
  const tel    = document.getElementById('new-tel').value.trim();
  const tipo   = document.getElementById('new-tipo').value;
  const horas  = document.getElementById('new-horas').value;
  const usos   = document.getElementById('new-usos').value;
  if (!codigo||!alumno){toast('Completa código y alumno','err');return;}
  toast('Creando...');
  try {
    const data = await apiCall({action:'crear',codigo,alumno,tutor,tel_tutor:tel,tipo,horas,usos_max:usos});
    if (!data.ok) throw new Error(data.error);
    const expira = new Date(data.expira);
    document.getElementById('res-codigo').textContent = data.codigo;
    document.getElementById('res-alumno').textContent = alumno+' · '+tipo;
    document.getElementById('res-expiry').textContent = 'Expira: '+expira.toLocaleString('es-MX');
    document.getElementById('result-box').style.display = 'block';
    lastCreated = {codigo:data.codigo,alumno,tutor,tel,tipo,expira};
    codigosCache = null;
    toast('✓ '+data.codigo+' creado','ok');
    ['new-codigo','new-alumno','new-tutor','new-tel'].forEach(id=>document.getElementById(id).value='');
  } catch(e){toast('Error: '+e.message,'err');}
}

// ══════════════ WHATSAPP ══════════════
function getMensaje() {
  if (!lastCreated) return '';
  const expira = new Date(lastCreated.expira);
  return `Hola! 👋\n\nTe comparto algo importante para *${lastCreated.alumno}* antes del examen ECOEMS 2026.\n\n*El examen consta de 128 preguntas en 3 horas.*\nNuestro simulacro diagnóstico te da la fotografía exacta:\n\n✅ En qué materias está bien\n❌ Dónde está fallando\n⏱ Cuánto tiempo tarda por pregunta\n🎯 Qué tan lejos está del corte de su plantel\n\n*Entra aquí con tu código:*\nhttps://marbus.github.io/prepasegura\n\n🔑 *Código:* ${lastCreated.codigo}\n⏰ Válido hasta: ${expira.toLocaleString('es-MX')}\n⚠️ 1 solo uso — una vez que inicie no hay pausa\n\n¡Mucho éxito! 🚀\n#PrepaSegura2026`;
}

function copiarMensaje() {
  navigator.clipboard.writeText(getMensaje()).then(()=>toast('Copiado ✓','ok'));
}
function compartirWhatsApp() {
  const tel = lastCreated?.tel ? '52'+lastCreated.tel : '';
  const url = tel
    ? `https://wa.me/${tel}?text=${encodeURIComponent(getMensaje())}`
    : `https://wa.me/?text=${encodeURIComponent(getMensaje())}`;
  window.open(url,'_blank');
}

// ══════════════ UTILS ══════════════
function getBadge(c,ahora) {
  if (c.estado==='agotado')  return {cls:'agotado', txt:'Usado'};
  if (c.estado==='inactivo') return {cls:'inactivo',txt:'Inactivo'};
  if (new Date(c.expira)<=ahora) return {cls:'expirado',txt:'Expirado'};
  return {cls:'activo',txt:'Activo'};
}

function toast(msg,type='') {
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='toast show'+(type?' '+type:'');
  setTimeout(()=>{el.className='toast';},3000);
}
</script>
</body>
</html>
